name: Notify Slack on New Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      send_all:
        description: 'Send ALL existing releases to Slack'
        required: true
        default: 'true'
        type: boolean

jobs:
  # ============================================
  # JOB 1: Send ALL existing releases (manual)
  # ============================================
  notify-all-releases:
    if: github.event_name == 'workflow_dispatch' && inputs.send_all == true
    runs-on: ubuntu-latest
    steps:
      - name: Fetch All Releases and Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Fetching all releases..."

          RELEASES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r 'sort_by(.published_at)')

          TOTAL=$(echo "$RELEASES" | jq length)
          echo "Found $TOTAL releases"

          # Send header message first
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"📋 Dawaabank - All Release History ($TOTAL releases)\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"divider\"
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

          sleep 1

          # Loop through each release
          echo "$RELEASES" | jq -c '.[]' | while read -r RELEASE; do
            TAG=$(echo "$RELEASE" | jq -r '.tag_name')
            NAME=$(echo "$RELEASE" | jq -r '.name // .tag_name')
            URL=$(echo "$RELEASE" | jq -r '.html_url')
            BODY=$(echo "$RELEASE" | jq -r '.body // "No release notes"' | head -5)
            AUTHOR=$(echo "$RELEASE" | jq -r '.author.login')
            DATE=$(echo "$RELEASE" | jq -r '.published_at' | cut -d'T' -f1)

            # Find .exe asset
            EXE_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url' | head -1)
            EXE_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".exe")) | .name' | head -1)
            EXE_SIZE=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".exe")) | .size' | head -1)

            if [ -n "$EXE_SIZE" ] && [ "$EXE_SIZE" != "null" ]; then
              EXE_SIZE_MB=$(echo "scale=1; $EXE_SIZE / 1048576" | bc)
              DOWNLOAD_TEXT="*📥 Download:* <$EXE_URL|$EXE_NAME> (${EXE_SIZE_MB} MB)"
              BUTTON_BLOCK="{
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"⬇️ Download $TAG\",
                      \"emoji\": true
                    },
                    \"url\": \"$EXE_URL\",
                    \"style\": \"primary\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"📄 View Release\",
                      \"emoji\": true
                    },
                    \"url\": \"$URL\"
                  }
                ]
              }"
            else
              DOWNLOAD_TEXT="*📥 Download:* <$URL|View Release Page>"
              BUTTON_BLOCK="{
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"📄 View Release\",
                      \"emoji\": true
                    },
                    \"url\": \"$URL\"
                  }
                ]
              }"
            fi

            # Escape special characters for JSON
            BODY_ESCAPED=$(echo "$BODY" | sed 's/"/\\"/g' | tr '\n' ' ')

            echo "Sending notification for: $TAG ($NAME)"

            curl -s -X POST -H 'Content-type: application/json' \
              --data "{
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"🚀 Dawaabank $TAG\",
                      \"emoji\": true
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*Version:*\n$TAG\"
                      },
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*Date:*\n$DATE\"
                      }
                    ]
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"$BODY_ESCAPED\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"$DOWNLOAD_TEXT\"
                    }
                  },
                  $BUTTON_BLOCK,
                  {
                    \"type\": \"context\",
                    \"elements\": [
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"Released by *$AUTHOR*\"
                      }
                    ]
                  },
                  {
                    \"type\": \"divider\"
                  }
                ]
              }" \
              "$SLACK_WEBHOOK_URL"

            # Wait 1 second between messages (Slack rate limit)
            sleep 1

          done

          echo "✅ All releases sent to Slack!"

  # ============================================
  # JOB 2: Send SINGLE new release (automatic)
  # ============================================
  notify-new-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Find EXE Download URL
        id: find_exe
        env:
          ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: |
          EXE_URL=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .browser_download_url')
          EXE_NAME=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .name')
          EXE_SIZE=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .size')
          EXE_SIZE_MB=$(echo "scale=1; $EXE_SIZE / 1048576" | bc)

          echo "exe_url=$EXE_URL" >> $GITHUB_OUTPUT
          echo "exe_name=$EXE_NAME" >> $GITHUB_OUTPUT
          echo "exe_size=${EXE_SIZE_MB} MB" >> $GITHUB_OUTPUT

      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Dawaabank New Version Released!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.event.release.tag_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Release Name:*\n${{ github.event.release.name }}"
                    }
                  ]
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📥 Download Installer:*\n<${{ steps.find_exe.outputs.exe_url }}|${{ steps.find_exe.outputs.exe_name }}> (${{ steps.find_exe.outputs.exe_size }})"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "⬇️ Download Setup",
                        "emoji": true
                      },
                      "url": "${{ steps.find_exe.outputs.exe_url }}",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📄 View Release",
                        "emoji": true
                      },
                      "url": "${{ github.event.release.html_url }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Released by *${{ github.event.release.author.login }}* | <${{ github.event.repository.html_url }}|View Repository>"
                    }
                  ]
                }
              ]
            }' \
            "$SLACK_WEBHOOK_URL"
