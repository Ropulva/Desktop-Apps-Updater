name: Notify Slack on New Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      send_all:
        description: 'Send ALL existing releases to Slack'
        required: true
        default: 'true'
        type: boolean

jobs:
  # ============================================
  # JOB 1: Send ALL existing releases (manual)
  # ============================================
  notify-all-releases:
    if: github.event_name == 'workflow_dispatch' && inputs.send_all == true
    runs-on: ubuntu-latest
    steps:
      - name: Fetch All Releases and Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "📦 Fetching all releases..."

          RELEASES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases")

          TOTAL=$(echo "$RELEASES" | jq 'length')
          echo "Found $TOTAL releases"

          # Debug: Test webhook first
          echo "🔍 Testing webhook connection..."
          echo '{"text":"🔌 Webhook test - connection OK"}' > /tmp/test.json
          TEST_RESPONSE=$(curl -s -o /tmp/slack_response.txt -w "%{http_code}" \
            -X POST -H 'Content-type: application/json' \
            --data @/tmp/test.json \
            "$SLACK_WEBHOOK_URL")
          echo "Test response code: $TEST_RESPONSE"
          echo "Test response body: $(cat /tmp/slack_response.txt)"

          if [ "$TEST_RESPONSE" != "200" ]; then
            echo "❌ Webhook not working! Check SLACK_WEBHOOK_URL secret."
            exit 1
          fi

          sleep 1

          # Send header message
          cat > /tmp/payload.json << 'EOF'
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📋 Dawaabank - All Release History",
                  "emoji": true
                }
              },
              {"type": "divider"}
            ]
          }
          EOF

          curl -s -X POST -H 'Content-type: application/json' \
            --data @/tmp/payload.json \
            "$SLACK_WEBHOOK_URL"

          sleep 1

          # Sort releases and save to temp file
          echo "$RELEASES" | jq -c 'sort_by(.published_at) | .[]' > /tmp/releases.jsonl

          COUNT=0
          while IFS= read -r RELEASE; do
            COUNT=$((COUNT + 1))
            TAG=$(echo "$RELEASE" | jq -r '.tag_name // "unknown"')
            URL=$(echo "$RELEASE" | jq -r '.html_url // ""')
            AUTHOR=$(echo "$RELEASE" | jq -r '.author.login // "unknown"')
            DATE=$(echo "$RELEASE" | jq -r '.published_at // ""' | cut -d'T' -f1)

            # Check if release has .exe asset
            HAS_EXE=$(echo "$RELEASE" | jq '[.assets[] | select(.name | endswith(".exe"))] | length')

            if [ "$HAS_EXE" -gt 0 ] 2>/dev/null; then
              EXE_URL=$(echo "$RELEASE" | jq -r '[.assets[] | select(.name | endswith(".exe"))][0].browser_download_url')
              EXE_NAME=$(echo "$RELEASE" | jq -r '[.assets[] | select(.name | endswith(".exe"))][0].name')
              EXE_SIZE=$(echo "$RELEASE" | jq -r '[.assets[] | select(.name | endswith(".exe"))][0].size')

              if [ -n "$EXE_SIZE" ] && [ "$EXE_SIZE" != "null" ] && [ "$EXE_SIZE" != "0" ]; then
                EXE_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", $EXE_SIZE / 1048576}")
              else
                EXE_SIZE_MB="?"
              fi

              # Build JSON with jq (safe - handles all special chars)
              jq -n \
                --arg tag "$TAG" \
                --arg date "$DATE" \
                --arg exe_name "$EXE_NAME" \
                --arg exe_url "$EXE_URL" \
                --arg exe_size "$EXE_SIZE_MB" \
                --arg url "$URL" \
                --arg author "$AUTHOR" \
                '{
                  "blocks": [
                    {
                      "type": "header",
                      "text": {"type": "plain_text", "text": ("🚀 Dawaabank " + $tag), "emoji": true}
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Version:*\n" + $tag)},
                        {"type": "mrkdwn", "text": ("*Date:*\n" + $date)}
                      ]
                    },
                    {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": ("*📥 Download:* <" + $exe_url + "|" + $exe_name + "> (" + $exe_size + " MB)")}
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {"type": "plain_text", "text": ("⬇️ Download " + $tag), "emoji": true},
                          "url": $exe_url,
                          "style": "primary"
                        },
                        {
                          "type": "button",
                          "text": {"type": "plain_text", "text": "📄 View Release", "emoji": true},
                          "url": $url
                        }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [{"type": "mrkdwn", "text": ("Released by *" + $author + "*")}]
                    },
                    {"type": "divider"}
                  ]
                }' > /tmp/payload.json

            else
              # No .exe - simple message
              jq -n \
                --arg tag "$TAG" \
                --arg date "$DATE" \
                --arg url "$URL" \
                --arg author "$AUTHOR" \
                '{
                  "blocks": [
                    {
                      "type": "header",
                      "text": {"type": "plain_text", "text": ("🚀 Dawaabank " + $tag), "emoji": true}
                    },
                    {
                      "type": "section",
                      "fields": [
                        {"type": "mrkdwn", "text": ("*Version:*\n" + $tag)},
                        {"type": "mrkdwn", "text": ("*Date:*\n" + $date)}
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {"type": "plain_text", "text": "📄 View Release", "emoji": true},
                          "url": $url
                        }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [{"type": "mrkdwn", "text": ("Released by *" + $author + "*")}]
                    },
                    {"type": "divider"}
                  ]
                }' > /tmp/payload.json
            fi

            echo "[$COUNT/$TOTAL] Sending: $TAG (EXE: $HAS_EXE)"

            RESPONSE=$(curl -s -o /tmp/slack_resp.txt -w "%{http_code}" \
              -X POST -H 'Content-type: application/json' \
              --data @/tmp/payload.json \
              "$SLACK_WEBHOOK_URL")

            echo "  → Response: $RESPONSE - $(cat /tmp/slack_resp.txt)"

            sleep 1

          done < /tmp/releases.jsonl

          echo "✅ Done! Sent $COUNT releases to Slack."

  # ============================================
  # JOB 2: Send SINGLE new release (automatic)
  # ============================================
  notify-new-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Find EXE Download URL
        id: find_exe
        env:
          ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: |
          EXE_URL=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .browser_download_url')
          EXE_NAME=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .name')
          EXE_SIZE=$(echo "$ASSETS_JSON" | jq -r '.[] | select(.name | endswith(".exe")) | .size')

          if [ -n "$EXE_SIZE" ] && [ "$EXE_SIZE" != "null" ]; then
            EXE_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", $EXE_SIZE / 1048576}")
          else
            EXE_SIZE_MB="unknown"
          fi

          echo "exe_url=$EXE_URL" >> $GITHUB_OUTPUT
          echo "exe_name=$EXE_NAME" >> $GITHUB_OUTPUT
          echo "exe_size=${EXE_SIZE_MB} MB" >> $GITHUB_OUTPUT

      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Dawaabank New Version Released!",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.event.release.tag_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Release Name:*\n${{ github.event.release.name }}"
                    }
                  ]
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📥 Download Installer:*\n<${{ steps.find_exe.outputs.exe_url }}|${{ steps.find_exe.outputs.exe_name }}> (${{ steps.find_exe.outputs.exe_size }})"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "⬇️ Download Setup",
                        "emoji": true
                      },
                      "url": "${{ steps.find_exe.outputs.exe_url }}",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📄 View Release",
                        "emoji": true
                      },
                      "url": "${{ github.event.release.html_url }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Released by *${{ github.event.release.author.login }}* | <${{ github.event.repository.html_url }}|View Repository>"
                    }
                  ]
                }
              ]
            }' \
            "$SLACK_WEBHOOK_URL"
